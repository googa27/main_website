      {
        "capability": "static-first portfolio content consolidation",
        "selected": [
          "Next.js static export",
          "TypeScript JSON module imports",
          "checked-in redacted resume adapter"
        ],
        "alternatives": [
          "runtime-only FastAPI fetches",
          "live GitHub counters during page render",
          "deleting the React-folio source repository"
