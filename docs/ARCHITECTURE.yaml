    "exception_policy": "exact scope, reason, owner, risk, accepted ceiling, and refactoring trigger; no-growth ratchet"
  },
  "exceptions": [
    {
      "rule": "source_fanout",
      "path": "apps/api/app/services",
      "reason": "Legacy FastAPI service package has eleven runtime modules; reshuffling during the static-first consolidation risks public API drift.",
      "owner": "googa27 Portfolio Project #24",
      "risk": "Service boundaries remain broader than the default fan-out budget until cohesive adapters are extracted.",
      "accepted_ceiling": 11,
      "refactoring_trigger": "Before adding another immediate service module, extract a subpackage or reduce the level to 10 runtime entries."
    },
    {
      "rule": "python_module_max_lines",
      "path": "apps/api/app/services/linkedin.py",
      "reason": "Legacy LinkedIn adapter exceeds the 500-line budget and is not touched by the static-first web migration.",
      "owner": "googa27 Portfolio Project #24",
      "risk": "Large adapter is harder to review and should not grow.",
      "accepted_ceiling": 704,
      "refactoring_trigger": "Any functional change to this adapter must split acquisition, parsing, cache, and DTO responsibilities or keep the line count at/below this ceiling."
