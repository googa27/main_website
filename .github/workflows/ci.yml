name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --filter web lint

      - name: Type check frontend
        run: pnpm --filter web typecheck

      - name: Check frontend formatting
        run: pnpm exec prettier --check apps/web packages/ui

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Lint backend
        working-directory: apps/api
        run: |
          ruff check .
          mypy .

      - name: Format check backend
        working-directory: apps/api
        run: ruff format --check .

      - name: Build frontend
        run: pnpm --filter web build

  test:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter web test

      - name: Run backend tests
        working-directory: apps/api
        run: |
          python -m pip install -e ".[dev]"
          pytest

      - name: Run repository architecture tests
        run: |
          python -m pip install pytest
          pytest tests/architecture

  security:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production dependency audit
        run: pnpm audit --prod --audit-level moderate

      - name: Run backend dependency audit
        run: |
          python -m pip install pip-audit
          pip-audit -r apps/api/requirements.txt
