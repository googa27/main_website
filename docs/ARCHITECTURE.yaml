      "rule": "python_module_max_lines",
      "path": "apps/api/app/services/cv.py",
      "reason": "Legacy CV service exceeds the 500-line budget and is not required for the static-first public site path.",
      "owner": "googa27 Portfolio Project #24",
      "risk": "Large service mixes resume parsing and API DTO concerns.",
      "accepted_ceiling": 584,
      "refactoring_trigger": "Any new CV behavior must extract smaller parser/normalizer/output modules or keep the line count at/below this ceiling."
    }
  ]
