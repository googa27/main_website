        "evidence": "docs/REACT_FOLIO_CONSOLIDATION.md and apps/web/src/lib/content.ts",
        "adapter_boundary": "apps/web/src/lib/content.ts; optional dynamic API remains behind apps/web/src/lib/api.ts",
        "custom_code_reason": "repository-specific curation/redaction and one-way migration evidence are not a generic library feature"
      }
    ]
  },
  "interfaces": {
    "ai": {
      "primary_agent": "Hermes Agent",
      "context_file": "AGENTS.md",
      "interaction": "AGENTS + deterministic frontend/backend commands and capability notes; no MCP/plugin by default.",
      "capability_discovery": "Existing deterministic entrypoints: build, clean, dev, format, lint, test, typecheck. Public site content is discoverable through apps/web/src/lib/content.ts; backend is optional unless a dynamic feature is justified.",
      "skills": "Use/update a repo or class-level Hermes skill for recurring non-trivial workflows",
      "plugin_mcp_policy": "deferred unless stable interfaces and measured multi-client/tool interoperability justify it",
      "declared_entrypoints": [
        "build (package script)",
        "clean (package script)",
        "dev (package script)",
        "format (package script)",
        "lint (package script)",
        "prepare (package script)",
        "test (package script)",
        "typecheck (package script)"
      ],
      "decision_ladder": [
        "AGENTS.md and linked contracts",
        "typed importable API and deterministic CLI/capability manifest",
        "Hermes skill for recurring procedures",
        "plugin only for measured shared lifecycle/tool needs",
        "MCP only for measured interoperable multi-client remote discovery"
      ],
      "mutation_safety": "Mutation is explicit, typed, least-privileged, human-reviewable, and independently verified; no autonomous public side effects by default."
    },
    "human": {
      "interaction": "Typed app/service APIs; notebook use only for isolated analytics services; no clever dunders.",
      "public_api_paths": [],
      "notebook_policy": "deterministic public-synthetic notebook/example for active libraries; explicit inapplicable/revival decision otherwise",
      "dunder_policy": "Only documented lawful Python/NumPy/IPython protocols with algebraic/parity tests; named methods for policy, effects, diagnostics, I/O, or ambiguity",
      "dunder_plan": [
        "Python dunders are inapplicable to the TypeScript monorepo; use language-native component/value contracts."
      ],
      "forbidden_dunders": [
        "Ambiguous arithmetic/order",
        "Stateful or effectful operators",
        "Lossy implicit conversion",
        "Dunders that hide policy, I/O, diagnostics, or failure modes"
      ]
    }
  },
  "tests": {
    "required_suites": [
      "unit",
      "integration",
      "e2e",
      "architecture"
    ],
    "commands": {
      "setup": "pnpm install --frozen-lockfile && (cd apps/api && python -m pip install -e .[dev])",
      "test": "pnpm test",
      "lint": "pnpm run lint",
      "architecture": "python scripts/check_portfolio_architecture.py"
    },
    "ci_workflow": ".github/workflows/portfolio-architecture.yml",
    "mirror_source": "where pertinent"
  },
  "data": {
