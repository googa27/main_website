    "import_boundaries": {
      "authority": "repository-specific existing gates plus this contract",
      "forbidden": [],
      "cycle_policy": "acyclic runtime layers unless an exact exception is recorded"
    },
    "public_api_paths": [
      "apps/web/src/lib/content.ts",
      "apps/web/src/lib/api.ts",
      "apps/api/app"
